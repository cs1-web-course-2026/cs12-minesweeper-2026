<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game">

      <header class="header">
        <div class="counter">🚩 <span>010</span></div>
        <button class="restartbtn" type="button" aria-label="Restart game">🔄</button>
        <div class="counter">⏱️ <span>000</span></div>
      </header>

      <div class="board">
        <!-- Row 1 - closed -->
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>

        <!-- Row 2 - open with numbers -->
        <div class="cell open n1">1</div>
        <div class="cell open n2">2</div>
        <div class="cell open n3">3</div>
        <div class="cell open n4">4</div>
        <div class="cell open n5">5</div>
        <div class="cell open n6">6</div>
        <div class="cell open n7">7</div>
        <div class="cell open n8">8</div>
        <div class="cell open"></div>

        <!-- Row 3 - flag, mine states -->
        <div class="cell flag">🚩</div>
        <div class="cell flagMine">🚩</div>
        <div class="cell closed"></div>
        <div class="cell mine">💣</div>
        <div class="cell mineHit">💣</div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>
        <div class="cell closed"></div>

        <!-- Rows 4-9 - closed -->
        <div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div>
        <div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div>
        <div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div>
        <div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div>
        <div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div>
        <div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div><div class="cell closed"></div>
      </div>

    </main>
  </body>
</html>
