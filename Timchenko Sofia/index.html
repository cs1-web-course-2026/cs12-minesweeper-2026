<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="game-container">

    <div class="topbar">
        <p class="title">Minesweeper</p>

        <div class="icons">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
    </div>

    <div class="info">
        <p>Times: 00:33</p>
        <p>Mines: 15</p>
    </div>

    <div class="emoji">
        <div class="reset-button">🙂</div>
    </div>

    <div class="field">

        <div class="row">
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <div class="row">
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell adjacent-mine-1">1</button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <div class="row">
            <button class="cell"></button>
            <button class="cell adjacent-mine-2">2</button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <div class="row">
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <div class="row">
            <button class="cell adjacent-mine-1">1</button>
            <button class="cell flag">🚩</button>
            <button class="cell adjacent-mine-1">1</button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <div class="row">
            <button class="cell"></button>
            <button class="cell adjacent-mine-2">2</button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

    </div>

</div>

</body>
</html>
