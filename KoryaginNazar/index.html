<!DOCTYPE html>
<html lang="uk-UA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="minesweeper">
    <div class="menu">
      <div id="flags-counter" class="counter-display" aria-live="polite">015</div>
      <button id="restart-button" class="restart-button" type="button" aria-label="Start or restart game">🙂</button>
      <div id="timer-counter" class="counter-display" aria-live="polite">000</div>
    </div>

    <div id="status-message" class="status-message" aria-live="polite">Гра розпочалась</div>

    <div id="playing-field" class="playing-field" aria-label="Minesweeper board"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
