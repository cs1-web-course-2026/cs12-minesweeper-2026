<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page" id="app" data-status="idle">
  <header class="hero">
    <div class="brand">
      <span class="eyebrow">Logic Puzzle</span>
      <h1 class="title">Minesweeper</h1>
      <p class="subtitle">Open every safe cell, mark the mines, and keep the board clean.</p>
    </div>

    <div class="hud" aria-label="Game controls and statistics">
      <div class="stat">
        <span class="label">Time</span>
        <span class="value" id="time-value" aria-live="polite">000</span>
      </div>

      <button class="reset" id="reset-button" type="button" aria-label="Start new game">&#128578;</button>

      <div class="stat">
        <span class="label">Flags Left</span>
        <span class="value" id="flags-value" aria-live="polite">015</span>
      </div>
    </div>
  </header>

  <main class="play-area">
    <section class="board-shell" aria-label="Game area">
      <div class="board-toolbar">
        <span
          class="status-pill"
          id="status-text"
          data-status="idle"
          role="status"
          aria-live="polite"
        >Ready to play</span>
        <span class="board-meta" id="board-meta">Preparing board</span>
      </div>

      <div
        class="board"
        id="board"
        aria-label="Minesweeper board"
        aria-describedby="board-hint"
      ></div>

      <p class="board-hint" id="board-hint">
        Left click or press Enter to open a cell. Right click or press F on a focused cell to place a flag.
      </p>
    </section>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
