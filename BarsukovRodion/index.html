<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Minesweeper Game - PR 3" />
    <title>Minesweeper - PR 3</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="game">
    <header class="game-header" aria-label="Game control panel">
        <div class="header-item header-flags">
            <span class="label">Flags</span>
            <output class="value" id="flag-count" aria-live="polite" aria-label="Number of flags">010</output>
        </div>
        <button
                class="header-item header-reset"
                id="reset-button"
                type="button"
                aria-label="Restart game"
                title="Restart game"
        >🙂</button>
        <div class="header-item header-timer">
            <span class="label">Time</span>
            <output class="value" id="timer" aria-live="polite" aria-label="Time in seconds">000</output>
        </div>
    </header>
    <main class="game-main">
        <div class="board" id="board" role="grid" aria-rowcount="9" aria-colcount="9"></div>
        <div id="game-status" class="game-status" role="status" aria-live="polite" hidden></div>
        <noscript>JavaScript is required for the game to work.</noscript>
    </main>
</div>
<script src="script.js"></script>
</body>
</html>
