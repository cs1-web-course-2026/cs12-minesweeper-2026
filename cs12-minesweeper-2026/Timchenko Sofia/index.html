<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>
<link rel="Minesweeper" href="style.css">
</head>

<body>

<div class="saper">

    <div class="topbar">
        <p class="title">Sapper</p>

        <div class="icons">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
    </div>

    <div class="info">
        <p>Times: 00:33</p>
        <p>Mines: 15</p>
    </div>

    <div class="emoji">
        <div class="emojiBox">🙂</div>
    </div>

    <div class="field">

        <div class="row">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="row">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell number1">1</div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="row">
            <div class="cell"></div>
            <div class="cell number2">2</div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="row">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="row">
            <div class="cell number1">1</div>
            <div class="cell flag">🚩</div>
            <div class="cell number1">1</div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="row">
            <div class="cell"></div>
            <div class="cell number2">2</div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
    </div>

</div>

</body>
</html>
