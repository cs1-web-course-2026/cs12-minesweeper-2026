<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Visual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="game-wrapper">
        <header class="game-header">
            <div class="status-panel">
                <span id="flag-count">010</span>
            </div>
            
            <button class="reset-btn">🙂</button>
            
            <div class="status-panel">
                <span id="timer">000</span>
            </div>
        </header>

        <main class="game-grid">
            <div class="cell"></div>
            <div class="cell open"></div>
            <div class="cell open">1</div>
            <div class="cell flag">🚩</div>
            <div class="cell mine">💣</div>
            <div class="cell mine exploded">💥</div>
            
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </main>
    </div>

</body>
</html>
